services:
  vllm-server:
    image: vllm/vllm-openai:latest
    container_name: vllm-moe
    runtime: nvidia
    ports:
      - "8000:8000"
    volumes:
      - /home/llm-lab-server-side/models:/models
    ipc: host
    command: >
      --model /models/Qwen3.5-35B-AWQ
      --pipeline-parallel-size 2
      --quantization awq
      --max-model-len 50000
      --max-num-batched-tokens 4096
      --kv-cache-dtype fp8
      --gpu-memory-utilization 0.85
      --served-model-name Qwen3.5-35B-AWQ
      --enable-prefix-caching
      --enable-chunked-prefill
      --trust-remote-code
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
