services:
  vllm-server:
    image: vllm/vllm-openai:latest
    container_name: vllm-moe-5
    runtime: nvidia
    ports:
      - "8000:8000"
    volumes:
      - /home/models:/models
    ipc: host
    environment:
      VLLM_RPC_TIMEOUT: "300000"
    command: >
      serve /models/Qwen3.6-27B-AWQ-INT4
      --tensor-parallel-size 2
      --max-model-len 32768
      --max-num-batched-tokens 8192
      --kv-cache-dtype fp8
      --gpu-memory-utilization 0.85
      --served-model-name Qwen3.6-27B-AWQ-INT4
      --enable-prefix-caching
      --enable-chunked-prefill
      --trust-remote-code
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]