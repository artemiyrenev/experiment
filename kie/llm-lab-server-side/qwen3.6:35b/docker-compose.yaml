services:
  vllm-server:
    image: vllm/vllm-openai:latest
    container_name: vllm-moe-4
    runtime: nvidia
    ports:
      - "8000:8000"
    volumes:
      - /home/models:/models
    ipc: host
    command: >
      --model /models/Qwen3.6-35B-A3B-AWQ-4bit
      --tensor-parallel-size 2
      --max-model-len 32768
      --max-num-batched-tokens 4096
      --kv-cache-dtype fp8
      --gpu-memory-utilization 0.75
      --served-model-name Qwen3.6-35B-AWQ
      --enable-prefix-caching
      --enable-chunked-prefill
      --trust-remote-code
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
